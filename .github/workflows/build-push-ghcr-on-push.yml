name: Build and push Docker image to GHCR on push

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_image:
        description: "Ubuntu 22.04 Vast desktop base image tag"
        required: true
        default: "vastai/linux-desktop:ubuntu22.04"
      image_name:
        description: "Image name"
        required: true
        default: "isaac-ros32-desktop"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set build variables
        id: vars
        run: |
          BASE_IMAGE="${{ github.event.inputs.base_image }}"
          IMAGE_NAME="${{ github.event.inputs.image_name }}"
          if [ -z "$BASE_IMAGE" ]; then BASE_IMAGE="vastai/linux-desktop:ubuntu22.04"; fi
          if [ -z "$IMAGE_NAME" ]; then IMAGE_NAME="isaac-ros32-desktop"; fi
          echo "base_image=$BASE_IMAGE" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            BASE_IMAGE=${{ steps.vars.outputs.base_image }}
          tags: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ steps.vars.outputs.image_name }}:ubuntu22
